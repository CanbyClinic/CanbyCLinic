<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Preventive care illustration</title><desc id="d">A shield, clock and screening path representing prevention before symptoms.</desc><defs><linearGradient id="g" x2="1" y2="1"><stop stop-color="#f2fbff"/><stop offset="1" stop-color="#eef9ef"/></linearGradient></defs><rect width="1600" height="900" fill="url(#g)"/><circle cx="1225" cy="205" r="270" fill="#dff2ff"/><circle cx="290" cy="730" r="280" fill="#def5e1"/><path d="M800 140l300 105v220c0 180-125 286-300 350-175-64-300-170-300-350V245z" fill="#0d5eb8"/><path d="M800 240v480c120-52 205-128 205-255V312z" fill="#18a11a"/><circle cx="800" cy="440" r="130" fill="#fff"/><path d="M800 350v94l72 48" fill="none" stroke="#0b2e55" stroke-width="24" stroke-linecap="round"/><circle cx="800" cy="440" r="13" fill="#0b2e55"/><g fill="#0b2e55" font-family="system-ui,sans-serif"><text x="100" y="125" font-size="54" font-weight="750">The useful window is often before symptoms.</text><text x="105" y="820" font-size="31">Evidence-based screening balances benefit, timing and risk.</text></g></svg>