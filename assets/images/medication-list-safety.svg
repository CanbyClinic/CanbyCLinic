<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Medication safety illustration</title><desc id="d">Medication bottles beside a detailed checklist.</desc><defs><linearGradient id="g" x2="1" y2="1"><stop stop-color="#eaf5ff"/><stop offset="1" stop-color="#eef9ef"/></linearGradient></defs><rect width="1600" height="900" fill="url(#g)"/><rect x="730" y="150" width="610" height="590" rx="40" fill="#fff" stroke="#0d5eb8" stroke-width="14"/><g stroke="#b5d2eb" stroke-width="12" stroke-linecap="round"><path d="M875 295h330M875 410h330M875 525h330M875 640h260"/></g><g fill="none" stroke="#18a11a" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"><path d="M795 290l25 27 48-62M795 405l25 27 48-62M795 520l25 27 48-62M795 635l25 27 48-62"/></g><g><rect x="180" y="360" width="205" height="320" rx="36" fill="#0d5eb8"/><rect x="215" y="285" width="135" height="95" rx="20" fill="#0b2e55"/><rect x="430" y="450" width="190" height="230" rx="34" fill="#18a11a"/><rect x="465" y="385" width="120" height="78" rx="18" fill="#0f7f17"/><path d="M245 510h76M468 560h115" stroke="#fff" stroke-width="18" stroke-linecap="round"/></g><g font-family="system-ui,sans-serif" fill="#0b2e55"><text x="90" y="115" font-size="54" font-weight="760">The safest medication list is the one that matches reality.</text><text x="90" y="835" font-size="31">Names, doses, timing, supplements and changes belong in one place.</text></g></svg>