<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Prediabetes illustration</title><desc id="d">A glucose meter and an open pathway representing an opportunity for prevention.</desc><defs><linearGradient id="g" x2="1" y2="1"><stop stop-color="#eaf5ff"/><stop offset="1" stop-color="#eef9ef"/></linearGradient></defs><rect width="1600" height="900" fill="url(#g)"/><path d="M0 740c360-240 630-205 860-65 250 152 470 93 740-105v330H0z" fill="#dff3e2"/><path d="M180 755c290-230 515-190 710-75 195 114 350 80 545-55" fill="none" stroke="#18a11a" stroke-width="28" stroke-linecap="round"/><rect x="910" y="160" width="370" height="470" rx="55" fill="#fff" stroke="#0d5eb8" stroke-width="16"/><rect x="988" y="250" width="214" height="118" rx="16" fill="#e9f4ff"/><text x="1095" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="58" font-weight="800" fill="#0b2e55">A1C</text><path d="M1020 450h150" stroke="#18a11a" stroke-width="22" stroke-linecap="round"/><circle cx="1095" cy="515" r="38" fill="#0d5eb8"/><path d="M1095 515v95" stroke="#0d5eb8" stroke-width="18"/><g font-family="system-ui,sans-serif" fill="#0b2e55"><text x="85" y="115" font-size="54" font-weight="760">Prediabetes is a warning window, not a verdict.</text><text x="90" y="835" font-size="31">Screening can reveal risk while there is still time to change the path.</text></g></svg>