<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="t d"><title id="t">Primary care infrastructure illustration</title><desc id="d">A clinic connects households, laboratories, pharmacies and specialists.</desc><defs><linearGradient id="g" x2="1" y2="1"><stop stop-color="#edf7ff"/><stop offset="1" stop-color="#effaf1"/></linearGradient></defs><rect width="1600" height="900" fill="url(#g)"/><g stroke="#91b8d8" stroke-width="14" fill="none"><path d="M800 450L330 230M800 450L280 665M800 450L1260 220M800 450L1320 660"/></g><g fill="#fff" stroke="#0d5eb8" stroke-width="12"><circle cx="330" cy="230" r="105"/><circle cx="280" cy="665" r="105"/><circle cx="1260" cy="220" r="105"/><circle cx="1320" cy="660" r="105"/></g><g fill="#0d5eb8"><path d="M285 255v-55h90v55z"/><path d="M230 700h100l-50-85z"/><rect x="1207" y="170" width="106" height="100" rx="18"/><path d="M1264 590l70 70-70 70-70-70z"/></g><g><circle cx="800" cy="450" r="220" fill="#0d5eb8"/><path d="M655 430l145-105 145 105v165H655z" fill="#fff"/><path d="M772 400v92m-46-46h92" stroke="#18a11a" stroke-width="24" stroke-linecap="round"/></g><g font-family="system-ui,sans-serif" fill="#0b2e55"><text x="90" y="115" font-size="54" font-weight="760">Primary care is local infrastructure for health.</text><text x="90" y="835" font-size="31">The value is not one visit; it is the connection between visits.</text></g></svg>